services:
    microsoft-rewards-script:
        image: ghcr.io/thenetsky/microsoft-rewards-script:4
        # To build locally instead of pulling the prebuilt image, use the build section below.
        #build:
        #    context: .
        container_name: microsoft-rewards-script
        restart: unless-stopped
        volumes:
            - ./config:/usr/src/microsoft-rewards-script/config
            - ./sessions:/usr/src/microsoft-rewards-script/sessions
        env_file:
            # Load account credentials from the .env file (ACCOUNT_1_EMAIL, ACCOUNT_1_PASSWORD, etc.)
            - path: .env
        environment:
            # Scheduling
            TZ: 'America/Toronto'
            NODE_ENV: 'production'
            CRON_SCHEDULE: '0 7 * * *' # use crontab.guru to customize your schedule
            RUN_ON_START: 'true' # run script immediately on container start
            SKIP_RANDOM_SLEEP: 'false'
            #MIN_SLEEP_MINUTES: "5"
            #MAX_SLEEP_MINUTES: "50"
            #STUCK_PROCESS_TIMEOUT_HOURS: "8"

            # Configuration
            # Uncomment to override defaults, a full list of configuration options are in the README.
            #CONFIG_CLUSTERS: '1'
            #... add additional configuration overrides as needed

        healthcheck:
            test: ['CMD', 'sh', '-c', 'pgrep cron > /dev/null || exit 1']
            interval: 60s
            timeout: 10s
            retries: 3
            start_period: 30s

        security_opt:
            - no-new-privileges:true
